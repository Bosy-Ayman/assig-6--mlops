name: ML Validation and Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – VALIDATE
  # ─────────────────────────────────────────────
  validate:
    name: Train & Validate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull data (DVC)
        run: echo "DVC pull simulated — dataset is generated inside train.py"

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python train.py | tee train_output.txt
          grep "^RUN_ID:" train_output.txt | sed 's/^RUN_ID://' > run_id.txt
          echo "Captured Run ID: $(cat run_id.txt)"

      # model_info.txt already contains both run_id and accuracy
      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: model_info.txt
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2 – DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Check Threshold & Deploy
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: .

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          RUN_ID=$(head -1 model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          docker build --build-arg RUN_ID="${RUN_ID}" -t ml-model:${RUN_ID} .
          echo "Docker image ml-model:${RUN_ID} built successfully."