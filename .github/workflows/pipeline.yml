name: ML Validation and Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Train & Validate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull data (DVC)
        run: echo "DVC pull simulated — dataset is generated inside train.py"

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python train.py | tee train_output.txt
          grep "^RUN_ID:" train_output.txt | sed 's/^RUN_ID://' > model_info.txt
          echo "Captured Run ID: $(cat model_info.txt)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            model_info.txt
            mlruns/
          retention-days: 1

  deploy:
    name: Check Threshold & Deploy
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: .

      # Debug — confirm files are where we expect them
      - name: List downloaded files
        run: |
          echo "=== Working directory ==="
          ls -la
          echo "=== mlruns/ contents ==="
          find mlruns/ -type f | head -20

      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          docker build --build-arg RUN_ID="${RUN_ID}" -t ml-model:${RUN_ID} .
          echo "Docker image ml-model:${RUN_ID} built successfully."